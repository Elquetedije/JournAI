<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JournAI - Diario Estelar</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="starry-background">
        <div class="nebula"></div>
        <div class="stars-container"></div>
        <div class="stars-container fast"></div>
    </div>

    <div id="app">
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h1 class="logo">Journ<span>AI</span></h1>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-label">Filtros de Vista</div>
                <div class="filter-list">
                    <button class="filter-btn active" data-filter="mood">
                        <span class="icon">✨</span>
                        <span class="label">Ánimo</span>
                    </button>
                    <button class="filter-btn" data-filter="activity">
                        <span class="icon">⚡</span>
                        <span class="label">Actividad</span>
                    </button>
                    <button class="filter-btn" data-filter="health">
                        <span class="icon">🩺</span>
                        <span class="label">Salud</span>
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="settingsBtn" class="sidebar-btn" title="Ajustes">
                    <span class="icon">⚙️</span>
                    <span class="label">Ajustes</span>
                </button>
                <div class="user-block">
                    <div class="profile-avatar">A</div>
                    <div class="user-info">
                        <span class="user-name">Usuario</span>
                        <span class="user-status">Diario Estelar</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="glass-header">
                <div class="calendar-nav">
                    <div class="nav-controls">
                        <button id="prevBtn" class="nav-btn">&lt;</button>
                        <div id="currentViewTitle" class="month-year-display clickable">Marzo 2026</div>
                        <button id="nextBtn" class="nav-btn">&gt;</button>
                    </div>
                </div>
            </header>

            <div class="calendar-container">
                <div class="weekdays">
                    <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
                </div>
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </main>

        <button id="writeTodayBtn" class="fab">
            <span class="icon">🖋️</span>
        </button>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content glass-card">
                <header class="modal-header">
                    <h2>Centro de Datos</h2>
                    <button id="closeSettings" class="close-btn">Esc para cerrar &times;</button>
                </header>
                <div class="settings-body">
                    <section class="settings-section">
                        <h3>Gestión de Datos</h3>
                        <p>Exporta tu diario en formato JSON para copias de seguridad o genera un documento estructurado para imprimir o guardar.</p>
                        <div class="settings-actions">
                            <button id="downloadBackup" class="secondary-btn">⬇️ Backup JSON</button>
                            <button id="uploadBackupBtn" class="secondary-btn">⬆️ Restaurar JSON</button>
                            <button id="exportDoc" class="primary-btn-outline">📄 Exportar a Documento</button>
                            <input type="file" id="importFile" accept=".json" class="hidden">
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- Entry Modal -->
        <div id="entryModal" class="modal-overlay hidden">
            <div class="modal-content glass-card">
                <section class="editor-main">
                    <header class="modal-header" style="position: relative; display: flex; align-items: center; justify-content: space-between; padding-right: 2rem;">
                        <h3 id="modalDateTitle">Entrada del día</h3>
                        <button id="deleteEntry" class="delete-btn-premium hidden" title="Eliminar Entrada">
                            <span>🗑️</span>
                        </button>
                    </header>
                    <textarea id="entryText" placeholder="Cuéntale a las estrellas cómo ha ido tu día..."></textarea>
                </section>
                
                <aside class="editor-sidebar">
                    <button id="closeModal" class="close-btn" style="position: absolute; top: 2rem; right: 2rem;">&times;</button>
                    
                    <div class="metrics-container">
                        <div class="metric">
                            <label>Ánimo <span id="moodValue">5</span></label>
                            <input type="range" id="moodSlider" min="1" max="10" value="5">
                        </div>
                        <div class="metric">
                            <label>Actividad <span id="activityValue">5</span></label>
                            <input type="range" id="activitySlider" min="1" max="10" value="5">
                        </div>
                        <div class="metric">
                            <label>Salud <span id="healthValue">5</span></label>
                            <input type="range" id="healthSlider" min="1" max="10" value="5">
                        </div>
                    </div>

                    <footer class="modal-footer">
                        <button id="saveEntry" class="primary-btn">
                            <span id="saveIcon">➕</span>
                            <span id="saveText">Guardar Entrada</span>
                        </button>
                    </footer>
                </aside>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
